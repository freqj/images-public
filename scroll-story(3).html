<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Story</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #111118;
    font-family: 'Inter', sans-serif;
    color: #fff;
    height: 100%;
  }

  .stage {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .map-side {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 80vh;
  }

  .map-slot {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .map-slot.active { opacity: 1; }

  .map-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Dots navigation */
  .dots {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: background 0.3s;
    border: none;
    padding: 0;
  }

  .dot.active { background: #fff; }
</style>
</head>
<body>

<div class="stage">
  <div class="map-side">
    <div class="map-slot active">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D1.png" alt="Map 1">
    </div>
    <div class="map-slot">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D2.png" alt="Map 2">
    </div>
    <div class="map-slot">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D3.png" alt="Map 3">
    </div>
    <div class="map-slot">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D4.png" alt="Map 4">
    </div>
  </div>
</div>

<nav class="dots">
  <button class="dot active" onclick="activate(0)"></button>
  <button class="dot" onclick="activate(1)"></button>
  <button class="dot" onclick="activate(2)"></button>
  <button class="dot" onclick="activate(3)"></button>
</nav>

<script>
  const maps = document.querySelectorAll('.map-slot');
  const dots = document.querySelectorAll('.dot');
  let current = 0;
  let lastWheel = 0;

  function activate(index) {
    if (index === current) return;
    current = index;
    maps.forEach((el, i) => el.classList.toggle('active', i === index));
    dots.forEach((el, i) => el.classList.toggle('active', i === index));
  }

  // Переключение колёсиком мыши внутри блока
  window.addEventListener('wheel', (e) => {
    const now = Date.now();
    if (now - lastWheel < 600) return; // debounce
    lastWheel = now;

    if (e.deltaY > 0 && current < 3) {
      e.preventDefault();
      activate(current + 1);
    } else if (e.deltaY < 0 && current > 0) {
      e.preventDefault();
      activate(current - 1);
    }
  }, { passive: false });

  // Свайп на тач
  let touchStartY = 0;
  window.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  window.addEventListener('touchend', (e) => {
    const diff = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(diff) < 30) return;
    if (diff > 0 && current < 3) activate(current + 1);
    if (diff < 0 && current > 0) activate(current - 1);
  }, { passive: true });

  activate(0);
</script>
</body>
</html>
