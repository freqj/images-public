<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Story</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Захватываем wheel ДО любого другого скрипта -->
<script>
  var _current = 0;
  var _total = 4;
  var _locked = false;

  document.addEventListener('wheel', function(e) {
    var atStart = _current === 0;
    var atEnd   = _current === _total - 1;

    if (e.deltaY > 0 && atEnd)   return; // последняя — пропускаем вниз
    if (e.deltaY < 0 && atStart) return; // первая — пропускаем вверх

    e.preventDefault();

    if (_locked) return;
    _locked = true;
    setTimeout(function() { _locked = false; }, 700);

    if (e.deltaY > 0 && _current < _total - 1) activate(_current + 1);
    if (e.deltaY < 0 && _current > 0)          activate(_current - 1);

  }, { passive: false, capture: true });
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #111118;
    font-family: 'Inter', sans-serif;
    color: #fff;
    height: 100%;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 24px;
  }

  .map-side {
    position: relative;
    width: 100%;
    max-width: 100%;
    height: 100vh;
  }

  .map-slot {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .map-slot.active { opacity: 1; }

  .map-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .dots {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: row;
    gap: 10px;
    z-index: 10;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: background 0.3s;
    border: none;
    padding: 0;
  }

  .dot.active { background: #fff; }
</style>
</head>
<body>

<div class="stage">
  <div class="map-side">
    <div class="map-slot active">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D1.png" alt="Map 1">
    </div>
    <div class="map-slot">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D2.png" alt="Map 2">
    </div>
    <div class="map-slot">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D3.png" alt="Map 3">
    </div>
    <div class="map-slot">
      <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D4.png" alt="Map 4">
    </div>
  </div>

  <nav class="dots">
    <button class="dot active" onclick="activate(0)"></button>
    <button class="dot" onclick="activate(1)"></button>
    <button class="dot" onclick="activate(2)"></button>
    <button class="dot" onclick="activate(3)"></button>
  </nav>
</div>

<script>
  const maps = document.querySelectorAll('.map-slot');
  const dots = document.querySelectorAll('.dot');

  function activate(index) {
    if (index === _current) return;
    _current = index;
    maps.forEach((el, i) => el.classList.toggle('active', i === index));
    dots.forEach((el, i) => el.classList.toggle('active', i === index));
  }

  // Свайп на тач
  let touchStartY = 0;
  document.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const diff = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(diff) < 40) return;
    if (diff > 0 && _current < _total - 1) activate(_current + 1);
    if (diff < 0 && _current > 0)          activate(_current - 1);
  }, { passive: true });
</script>
</body>
</html>
