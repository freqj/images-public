<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Story</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #111118;
    font-family: 'Inter', sans-serif;
    color: #fff;
    height: 100%;
    overflow: hidden;
  }

  .scroller {
    height: 100vh;
    overflow-y: scroll;
    scrollbar-width: none;
  }
  .scroller::-webkit-scrollbar { display: none; }

  .sticky-wrap {
    position: relative;
    height: 400vh;
  }

  .sticky {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .map-side {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 80vh;
  }

  .map-slot {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .map-slot.active {
    opacity: 1;
  }

  .map-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: none;
  }
</style>
</head>
<body>

<div class="scroller" id="scroller">
  <div class="sticky-wrap">
    <div class="sticky">
      <div class="map-side">
        <div class="map-slot active">
          <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D1.png" alt="Map 1">
        </div>
        <div class="map-slot">
          <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D2.png" alt="Map 2">
        </div>
        <div class="map-slot">
          <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D3.png" alt="Map 3">
        </div>
        <div class="map-slot">
          <img src="https://raw.githubusercontent.com/freqj/images-public/refs/heads/main/Property%201%3D4.png" alt="Map 4">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const scroller = document.getElementById('scroller');
  const stickyWrap = document.querySelector('.sticky-wrap');
  const maps = document.querySelectorAll('.map-slot');
  let current = -1;

  function activate(index) {
    if (index === current) return;
    current = index;
    maps.forEach((el, i) => el.classList.toggle('active', i === index));
  }

  scroller.addEventListener('scroll', () => {
    const scrolled = scroller.scrollTop;
    const max = stickyWrap.offsetHeight - scroller.clientHeight;
    const progress = Math.min(0.9999, scrolled / max);
    activate(Math.min(3, Math.floor(progress * 4)));
  }, { passive: true });

  activate(0);
</script>
</body>
</html>
